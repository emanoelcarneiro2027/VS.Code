<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo de Adivinhação</title>
    <style>
        /* CSS para deixar o visual limpo e moderno */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        p {
            color: #666;
        }
        input [type="number"] {
            padding: 10px;
            width: 80px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 6px;
            text-align: center;
            margin-bottom: 15px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #0056b3;
        }
        .mensagem {
            margin-top: 20px;
            font-weight: bold;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Adivinhe o Número!</h1>
        <p>Eu pensei em um número entre <b>1 e 100</b>. Você consegue adivinhar qual é?</p>
        
        <input type="number" id="palpite" min="1" max="100" placeholder="0">
        <br>
        <button onclick="verificarPalpite()">Enviar Palpite</button>

        <div id="resultado" class="mensagem"></div>
    </div>

    <script>
        // O computador escolhe um número aleatório entre 1 e 100
        const numeroSecreto = Math.floor(Math.random() * 100) + 1;
        let tentativas = 0;

        function verificarPalpite() {
            // Pega o valor digitado no input
            const inputPalpite = document.getElementById('palpite');
            const palpite = Number(inputPalpite.value);
            const resultado = document.getElementById('resultado');

            // Validação simples
            if (!palpite || palpite < 1 || palpite > 100) {
                resultado.style.color = "orange";
                resultado.textContent = "Por favor, digite um número válido entre 1 e 100.";
                return;
            }

            tentativas++;

            // Lógica do jogo
            if (palpite === numeroSecreto) {
                resultado.style.color = "green";
                resultado.textContent = `🎉 Parabéns! Você acertou em ${tentativas} tentativas!`;
                inputPalpite.disabled = true; // Desativa o campo após acertar
            } else if (palpite < numeroSecreto) {
                resultado.style.color = "#dc3545";
                resultado.textContent = "Muito baixo! Tente um número maior. 👇";
            } else {
                resultado.style.color = "#dc3545";
                resultado.textContent = "Muito alto! Tente um número menor. ☝️";
            }

            // Limpa o campo de texto para o próximo palpite
            inputPalpite.value = '';
            inputPalpite.focus();
        }
    </script>

</body>
</html>
